<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>{{NAME}} &mdash; CV</title>
  <style>
    @page { size: A4; margin: 18mm; }
    * { box-sizing: border-box; }
    html, body { padding: 0; margin: 0; }
    body {
      font-family: 'Inter', system-ui, -apple-system, 'Segoe UI', Helvetica, Arial, sans-serif;
      font-size: 10.5pt;
      line-height: 1.5;
      color: #111;
      background: #fff;
    }
    .doc { max-width: 720px; margin: 0 auto; }
    h1 { font-size: 20pt; font-weight: 700; letter-spacing: -0.01em; margin-bottom: 2px; }
    h2 { font-size: 11pt; text-transform: uppercase; letter-spacing: 0.06em; margin-top: 18px; margin-bottom: 6px; border-bottom: 1px solid #ddd; padding-bottom: 3px; }
    h3 { font-size: 11pt; font-weight: 600; margin-top: 10px; margin-bottom: 2px; }
    .headline { color: #555; font-size: 11pt; margin-bottom: 6px; }
    .meta { color: #555; font-size: 10pt; margin-bottom: 12px; }
    p { margin: 6px 0; }
    ul { margin: 4px 0 8px 18px; padding: 0; }
    li { margin: 2px 0; }
    a { color: inherit; text-decoration: none; }
    .role-meta { color: #666; font-size: 10pt; }
  </style>
</head>
<body>
  <div class="doc">
    <h1>{{NAME}}</h1>
    {{HEADLINE_BLOCK}}
    <p class="meta">{{META}}</p>
    {{BODY}}
  </div>
</body>
</html>
